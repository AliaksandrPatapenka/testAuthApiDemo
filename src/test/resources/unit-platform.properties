# 1. Включаем параллельное выполнение тестов
junit.jupiter.execution.parallel.enabled = true

# 2. Указываем, что методы в классе должны выполняться параллельно
junit.jupiter.execution.parallel.mode.default = concurrent

# 3. Указываем, что сами классы тоже должны выполняться параллельно
junit.jupiter.execution.parallel.mode.classes.default = concurrent

# 4. Выбираем стратегию: "fixed" — использовать фиксированное число потоков
junit.jupiter.execution.parallel.config.strategy = fixed

# 5. Устанавливаем число потоков (например, 4). Подставьте нужное вам значение.
junit.jupiter.execution.parallel.config.fixed.parallelism = 2
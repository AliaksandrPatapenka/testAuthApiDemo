#Тестовая площадка
base.uri=https://api.escuelajs.co
base.path=/api/v1

#TimeOut
http.connection.timeout=10000
http.socket.timeout=10000

#Валидные тестовые пользователи
user.email=john@mail.com
user.password=changeme

#Невалидные тестовые данные пользователя
user.nonExistentEmail=nonExistentEmail@test.ru
user.invalidFormatEmail=@@@
user.invalidPassword=invalidPassword


#Тестовые данные
image.uri=https://test.com
email.template=Test_%s@example.com
user.name=Test_%s

#Patch Users CRUD
endpoint.users=/users/
endpoint.is_available=/users/is-available/

#Patch Auth JWT
endpoint.login=/auth/login/
endpoint.profile=/auth/profile/
endpoint.refreshToken=/auth/refresh-token/

